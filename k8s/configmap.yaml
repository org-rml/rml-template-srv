# TODO: Substituir SERVICE_NAME e ajustar variáveis de ambiente
apiVersion: v1
kind: ConfigMap
metadata:
  name: rml-srv-SERVICE_NAME-config
  namespace: sovarais
data:
  SERVER_PORT: "8080"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "SERVICE_NAME"  # TODO: Alterar para o schema do serviço
